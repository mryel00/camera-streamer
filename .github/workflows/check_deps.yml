name: "Check libcamera dependency update"

on:
  schedule:
    - cron: "42 */6 * * *"
  workflow_dispatch:

jobs:
  check:
    name: "Check"
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.compare.outputs.changed }}
    steps:
    - name: Restore last known state
      uses: actions/cache/restore@v4
      with:
        path: last_state.json
        key: ${{ runner.os }}-check-deps-${{ github.run_id }}
        restore-keys: |
          ${{ runner.os }}-check-deps-

    - name: Discover and check all libcamera packages
      id: discover
      run: |
        set -euo pipefail

        # Define distros and their Packages URLs (only distros you actually build for)
        declare -A DISTROS=(
          ["bookworm"]="http://archive.raspberrypi.org/debian/dists/bookworm/main/binary-armhf/Packages"
          ["trixie"]="http://archive.raspberrypi.org/debian/dists/trixie/main/binary-armhf/Packages"
        )

        echo "{}" > new_state.json

        for distro in "${!DISTROS[@]}"; do
          url="${DISTROS[$distro]}"
          echo "=== Checking $distro ==="

          # Download the Packages file and extract only the runtime libcamera packages
          curl -sfL "$url" | awk '
            /^Package: / && $2 ~ /^libcamera0(\.[0-9]+)*$/ { pkg=$2 }
            /^Version: / && pkg { print pkg "=" $2; pkg="" }
          ' | sort > "${distro}_packages.txt"

          echo "Found packages in $distro:"
          cat "${distro}_packages.txt"

          # Store as JSON for structured comparison
          jq -Rn --arg distro "$distro" '
            [inputs | split("=") | {(.[0]): .[1]}] | add // {}
            | {($distro): .}
          ' "${distro}_packages.txt" > "${distro}_state.json"

          # Merge into new_state.json
          jq -s '.[0] * .[1]' new_state.json "${distro}_state.json" > tmp.json
          mv tmp.json new_state.json
        done

        echo "New state:"
        cat new_state.json

    - name: Compare with last known state
      id: compare
      run: |
        set -euo pipefail

        # Initialize last_state.json if it doesn't exist
        if [ ! -f last_state.json ]; then
          echo "{}" > last_state.json
        fi

        echo "Last state:"
        cat last_state.json
        echo ""
        echo "New state:"
        cat new_state.json

        # Compute diff
        if diff <(jq -S . last_state.json) <(jq -S . new_state.json) > /dev/null 2>&1; then
          echo "changed=false" >> "$GITHUB_OUTPUT"
          echo "summary=No changes detected." >> "$GITHUB_OUTPUT"
        else
          echo "changed=true" >> "$GITHUB_OUTPUT"

          # Build a human-readable summary of what changed
          summary=$(diff <(jq -S . last_state.json) <(jq -S . new_state.json) || true)
          # Escape for GH output (multiline)
          {
            echo "summary<<EOF"
            echo "$summary"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        fi

    - name: Upload new state as artifact
      uses: actions/upload-artifact@v4
      with:
        name: dep-state
        path: new_state.json

  release:
    needs: check
    if: needs.check.outputs.changed == 'true'
    uses: ./.github/workflows/build_release.yaml
    permissions:
      contents: write

  update-cache:
    name: "Update Cache"
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Download new state
        uses: actions/download-artifact@v4
        with:
          name: dep-state

      - name: Rename for cache
        run: mv new_state.json last_state.json

      - name: Save new result
        uses: actions/cache/save@v4
        with:
          path: last_state.json
          key: ${{ runner.os }}-check-deps-${{ github.run_id }}

  notify:
    name: "Notify via Issue"
    needs: release
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create Success Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo ${{ github.repository }} \
            --title "New Release Created: Dependency Update" \
            --body "A new version of libcamera was found and a release has been built successfully. View the run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} @${{ github.repository_owner }}"
